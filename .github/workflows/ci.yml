name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Code Quality (runs in parallel)
  # ──────────────────────────────────────────────

  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format
        run: ruff format --check src/ tests/

  typecheck:
    name: "Type Check (mypy --strict)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" types-openpyxl types-networkx
      - name: Mypy strict
        run: mypy src/ --strict

  # ──────────────────────────────────────────────
  # Stage 2: Tests (unit runs in parallel with Stage 1)
  # ──────────────────────────────────────────────

  test-unit:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=results/unit-${{ matrix.python-version }}.xml
      - name: Run deterministic eval tests (no API key)
        run: pytest tests/evals/test_contract_tier.py tests/evals/test_trigger_evals.py -v --tb=short -m "not eval" --junitxml=results/evals-deterministic-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: results/

  # ──────────────────────────────────────────────
  # Stage 3: Integration (after lint + unit pass)
  # ──────────────────────────────────────────────

  test-integration:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -k "not test_agent_spawning" --junitxml=results/integration.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: results/

  # ──────────────────────────────────────────────
  # Stage 4: Build verification
  # ──────────────────────────────────────────────

  build:
    name: "Build Package"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify package
        run: twine check dist/*
      - name: Verify CLI entry point
        run: |
          pip install dist/*.whl
          dd-agents version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-docker:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t dd-agents:ci-test .
      - name: Verify CLI in container
        run: docker run --rm dd-agents:ci-test version

  # ──────────────────────────────────────────────
  # Stage 5: E2E (main branch only, requires API key)
  # ──────────────────────────────────────────────

  test-e2e:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    needs: [test-integration, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run end-to-end tests
        run: pytest tests/e2e/ -v --tb=long -m "e2e" --junitxml=results/e2e.xml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: results/

  # ──────────────────────────────────────────────
  # Stage 6: Model-graded evals (main branch only, requires API key)
  #
  # Non-blocking (continue-on-error): the eval tier exercises real model
  # calls (pytest marker "eval") and reports quality regressions without
  # gating the merge.  Also runnable on demand via workflow_dispatch.
  # Requires the ANTHROPIC_API_KEY repository secret.
  # ──────────────────────────────────────────────

  evals:
    name: "Model-Graded Evals"
    runs-on: ubuntu-latest
    needs: [test-integration, build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run eval tier
        run: pytest tests/evals/ -v --tb=short -m "eval" --junitxml=results/evals.xml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Median-of-3 sampling de-noises single-draw LLM variance so a one-off
          # unlucky run doesn't flake the (non-blocking) eval signal. Recall and
          # false-positive floors stay hard — see tests/evals/test_eval_robustness.py.
          DD_EVAL_SAMPLES: "3"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: results/

  # ──────────────────────────────────────────────
  # Stage 7: Gateway provider proof (main branch / dispatch)
  #
  # Continuous proof of the model/provider-agnostic path (Issue #231): stand up
  # a LiteLLM proxy that fronts the Anthropic Messages API behind
  # ANTHROPIC_BASE_URL and run the opt-in `-m gateway` test through it. This
  # exercises the whole seam → SDK → CLI → gateway stack on every push to main,
  # so a regression in the provider seam or gateway path can't ship silently.
  # Non-blocking + requires the ANTHROPIC_API_KEY secret (skips cleanly without).
  # ──────────────────────────────────────────────

  test-gateway:
    name: "Gateway Provider Proof"
    runs-on: ubuntu-latest
    needs: [test-integration, build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies + LiteLLM proxy
        run: |
          pip install -e ".[dev]"
          pip install 'litellm[proxy]'
      - name: Start LiteLLM gateway (fronts the Anthropic Messages API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY secret — skipping gateway proof."
            echo "GATEWAY_READY=0" >> "$GITHUB_ENV"
            exit 0
          fi
          cat > /tmp/gw.yaml <<'YAML'
          model_list:
            - model_name: "*"
              litellm_params:
                model: anthropic/claude-sonnet-4-5-20250929
                api_key: os.environ/ANTHROPIC_API_KEY
          litellm_settings:
            drop_params: true
          YAML
          nohup litellm --config /tmp/gw.yaml --port 4011 > /tmp/gw.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4011/health/liveliness >/dev/null 2>&1; then
              echo "GATEWAY_READY=1" >> "$GITHUB_ENV"; break
            fi
            sleep 2
          done
      - name: Run gateway provider test
        if: env.GATEWAY_READY == '1'
        env:
          DD_TEST_GATEWAY_URL: http://localhost:4011
          DD_TEST_GATEWAY_KEY: sk-anything
          DD_TEST_GATEWAY_MODEL: claude-sonnet-4-6
          DD_MAX_OUTPUT_TOKENS: "4096"
        run: pytest tests/e2e/test_gateway_provider.py -v --tb=long -m "gateway" --junitxml=results/gateway.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gateway-results
          path: results/
