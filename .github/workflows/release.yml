name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.4.1)"
        required: true

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Gate: run full test suite before releasing
  # ──────────────────────────────────────────────

  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" types-openpyxl types-networkx
      - name: Lint
        run: ruff check src/ tests/ && ruff format --check src/ tests/
      - name: Type check
        run: mypy src/ --strict
      - name: Unit tests
        run: pytest tests/unit/ -x -q
      - name: Integration tests
        run: pytest tests/integration/ -x -q -k "not test_agent_spawning"

  # ──────────────────────────────────────────────
  # Build Python package
  # ──────────────────────────────────────────────

  build:
    name: "Build Package"
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify CLI entry point
        run: |
          pip install dist/*.whl
          dd-agents version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────
  # Publish to PyPI (trusted publishing via OIDC)
  # ──────────────────────────────────────────────

  publish-pypi:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────
  # Publish Docker image to GHCR
  # ──────────────────────────────────────────────

  publish-docker:
    name: "Publish Docker Image"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────
  # Update Homebrew formula with new version
  # ──────────────────────────────────────────────

  update-formula:
    name: "Update Homebrew Formula"
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update formula version and SHA256
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"

          # Wait for PyPI to propagate the new version
          for i in 1 2 3 4 5; do
            URL=$(curl -sf "https://pypi.org/pypi/dd-agents/${VERSION}/json" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          sdist = [u for u in data['urls'] if u['packagetype'] == 'sdist']
          print(sdist[0]['url'] if sdist else '')
          " 2>/dev/null)
            if [ -n "$URL" ]; then break; fi
            echo "Waiting for PyPI to propagate version ${VERSION}... (attempt $i)"
            sleep 15
          done

          if [ -z "$URL" ]; then
            echo "::warning::Could not fetch PyPI URL for version ${VERSION} — skipping formula update"
            exit 0
          fi

          SHA256=$(curl -sf "https://pypi.org/pypi/dd-agents/${VERSION}/json" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          sdist = [u for u in data['urls'] if u['packagetype'] == 'sdist']
          print(sdist[0]['digests']['sha256'] if sdist else '')
          ")

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/dd-agents.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/dd-agents.rb

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dd-agents.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
          else
            git commit -m "Update Homebrew formula to ${GITHUB_REF_NAME#v}"
            git push
          fi

      - name: Update Homebrew tap repo
        run: |
          cd /tmp
          git clone https://x-access-token:${{ secrets.TAP_GITHUB_TOKEN }}@github.com/zoharbabin/homebrew-due-diligence-agents.git tap
          cp Formula/dd-agents.rb tap/Formula/dd-agents.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dd-agents.rb
          if git diff --cached --quiet; then
            echo "No tap formula changes to commit"
          else
            git commit -m "Update dd-agents to ${GITHUB_REF_NAME#v}"
            git push
          fi

  # ──────────────────────────────────────────────
  # Create GitHub Release with changelog
  # ──────────────────────────────────────────────

  github-release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > notes.md
            echo "" >> notes.md
            git log "$PREV_TAG".."$TAG" --pretty=format:"- %s" --no-merges >> notes.md
          else
            echo "## Initial release" > notes.md
          fi
          echo "" >> notes.md
          echo "---" >> notes.md
          echo "" >> notes.md
          echo "### Install" >> notes.md
          echo '```bash' >> notes.md
          echo "pip install dd-agents==${TAG#v}" >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          echo "### Docker" >> notes.md
          echo '```bash' >> notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:${TAG#v}" >> notes.md
          echo '```' >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          body_path: notes.md
          files: dist/*
          generate_release_notes: true
